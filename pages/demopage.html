<!DOCTYPE html>
<html lang="ja" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>jdomadd.js demopage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Yuuto">
  <meta name="date" content="2025-08-06">
  <style>
    body { font-family: sans-serif; padding: 2em; background: #f9f9f9; }
    h1 { color: #333; }
    .card { margin: 1em 0; padding: 1em; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    button { padding: 0.5em 1em; background: #ff66aa; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🍓 jdomadd.js demopage</h1>
  <p>On this page, you can experience how to generate DOM elements using <strong>jdomadd.js</strong></p>

  <div id="demo-area"></div>

  <script src="../jdomadd.js"></script>
  <script>
    jdomAdd("button", {
      text: "Click to talk",
      speakText: "Hello this is a demo.",
      style: { marginBottom: "1em" },
      events: {
        click: () => alert("Button clicked")
      },
      parent: "demo-area"
    });

    jdomAdd("div", {
  cardify: {
    img: "../assets/material.jpeg",
    title: "Card Demo",
    text: "This is a card layout demo."
  },
  style: { backgroundColor: "#eef" },
  parent: "demo-area"
});
  </script>
</body>
</html>
